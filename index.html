<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>lahza — AI Automation & Software Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Noto+Kufi+Arabic:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0d0d; --sidebar: #050505; --panel: #171717; --panel2: #1e1e1e; --border: #262626;
    --text: #f0f0eb; --muted: #8f8f8a;
    --accent: #b8ea2e; --accent-dim: #6b7c1f; --accent2: #d4f95a;
    --user-msg: #1c1c1c;
    --success: #b8ea2e; --warn: #f59e0b; --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; font-family: "Inter","Noto Kufi Arabic",system-ui,-apple-system,sans-serif;
    background: var(--bg); color: var(--text); direction: rtl; overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  .app { height: 100vh; display: grid; grid-template-columns: 260px 1fr; }

  /* ===== Sidebar ===== */
  .sidebar { background: var(--sidebar); padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 8px 8px 18px; }
  .brand-icon { width: 30px; height: 30px; display: grid; place-items: center; flex-shrink: 0; }
  .brand h1 { font-size: 16px; font-weight: 700; letter-spacing: -.2px; }

  .new-chat-btn {
    display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 12px;
    border-radius: 10px; border: 1px solid var(--border); background: var(--panel);
    color: var(--text); font-size: 14px; font-family: inherit; text-align: right; cursor: pointer;
    transition: .15s; margin-bottom: 14px;
  }
  .new-chat-btn:hover { border-color: var(--accent-dim); background: var(--panel2); }
  .new-chat-btn .plus { color: var(--accent); font-weight: 700; font-size: 16px; }

  .nav-btn {
    width: 100%; padding: 9px 12px; border-radius: 8px; border: none; background: transparent;
    color: var(--muted); font-size: 13px; font-family: inherit; text-align: right; cursor: pointer;
    transition: .15s; display: flex; align-items: center; gap: 8px;
  }
  .nav-btn:hover { background: var(--panel); color: var(--text); }

  .sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot.on { background: var(--success); } .dot.off { background: var(--danger); } .dot.loading { background: var(--warn); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }
  .status-line { padding: 6px 10px; font-size: 11.5px; color: var(--muted); display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border); margin-top: 6px; padding-top: 12px; }

  /* ===== Main ===== */
  .main { display: flex; flex-direction: column; min-width: 0; height: 100vh; background: var(--bg); }
  .topbar { height: 52px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .topbar .pill { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; background: var(--panel); border: 1px solid var(--border); font-size: 12.5px; color: var(--muted); }

  .chat-scroll { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
  .main { position: relative; }
  .scroll-down-btn {
    position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--panel);
    color: var(--text); display: none; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,.4); transition: .15s; z-index: 5;
  }
  .scroll-down-btn:hover { background: var(--panel2); border-color: var(--accent-dim); }
  .scroll-down-btn.show { display: flex; }
  .scroll-down-btn svg { width: 18px; height: 18px; }
  .chat { max-width: 720px; margin: 0 auto; padding: 20px 24px 40px; display: flex; flex-direction: column; gap: 22px; min-height: 100%; }
  .chat-scroll::-webkit-scrollbar { width: 6px; } .chat-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .welcome { margin: auto; text-align: center; max-width: 480px; padding: 40px 20px; }
  .welcome .mark { margin: 0 auto 18px; width: 56px; height: 56px; }
  .welcome h3 { font-size: 26px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
  .welcome p { color: var(--muted); font-size: 14px; line-height: 1.9; }

  .row { display: flex; gap: 12px; }
  .row.user { justify-content: flex-start; }
  .row.bot { justify-content: flex-end; flex-direction: row-reverse; }

  .avatar { width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; display: grid; place-items: center; margin-top: 2px; }
  .avatar.bot-avatar { background: var(--panel); border: 1px solid var(--border); }
  .avatar svg { width: 16px; height: 16px; }

  .bubble { max-width: 560px; font-size: 15px; line-height: 1.85; word-break: break-word; direction: rtl; unicode-bidi: plaintext; text-align: right; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: translateY(0);} }
  .row.user .bubble { background: var(--user-msg); border: 1px solid var(--border); border-radius: 16px; padding: 12px 16px; }
  .row.bot .bubble { padding: 2px 4px; color: var(--text); }

  .bubble pre { direction: ltr; text-align: left; background: #0a0a0a; border: 1px solid var(--border); border-radius: 10px; padding: 12px; overflow-x: auto; margin-top: 8px; font-family: "Cascadia Code","Fira Code",Consolas,monospace; font-size: 13px; }
  .bubble img.gen { max-width: 100%; border-radius: 10px; margin-top: 8px; border: 1px solid var(--border); display: block; }

  .note-row { text-align: left; direction: ltr; }
  .note-row .bubble { font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; }
  .error-row .bubble { color: #ffb4b4; background: rgba(239,68,68,.08); border: 1px solid var(--danger); border-radius: 10px; padding: 10px 14px; font-size: 13px; }

  /* ===== Composer ===== */
  .composer-wrap { padding: 10px 24px 22px; flex-shrink: 0; }
  .composer { max-width: 720px; margin: 0 auto; }
  .composer-box {
    display: flex; gap: 8px; align-items: flex-end; background: var(--panel);
    border: 1px solid var(--border); border-radius: 22px; padding: 8px 8px 8px 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  .composer-box:focus-within { border-color: var(--accent-dim); }
  #input { flex: 1; resize: none; border: none; outline: none; background: transparent; color: var(--text); font-size: 15px; font-family: inherit; line-height: 1.6; min-height: 24px; max-height: 130px; padding: 8px 4px; direction: rtl; unicode-bidi: plaintext; text-align: right; }
  #input::placeholder { color: #55554f; }
  .send-btn {
    border: none; border-radius: 50%; width: 34px; height: 34px; flex-shrink: 0;
    display: grid; place-items: center; background: var(--accent); color: #0a0a0a; cursor: pointer; transition: .15s;
  }
  .send-btn:hover { opacity: .88; } .send-btn:disabled { opacity: .3; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }
  .hint { margin-top: 8px; color: #55554f; font-size: 11.5px; display: flex; justify-content: space-between; padding: 0 6px; }

  .attach-btn {
    border: none; border-radius: 50%; width: 32px; height: 32px; flex-shrink: 0; margin-bottom: 1px;
    display: grid; place-items: center; background: transparent; color: var(--muted); cursor: pointer; transition: .15s;
  }
  .attach-btn:hover { color: var(--text); background: var(--panel2); }
  .attach-btn svg { width: 17px; height: 17px; }

  .attach-chip {
    display: flex; align-items: center; gap: 8px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 6px 10px; margin-bottom: 8px; font-size: 12.5px; color: var(--muted);
    width: fit-content; max-width: 100%;
  }
  .attach-chip img { width: 26px; height: 26px; border-radius: 6px; object-fit: cover; }
  .attach-chip .remove { cursor: pointer; color: var(--danger); font-weight: 700; padding: 0 4px; }

  .bubble .file-tag {
    display: inline-flex; align-items: center; gap: 6px; background: var(--panel2); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 10px; font-size: 12.5px; color: var(--muted); margin-bottom: 6px;
  }

  @media (max-width: 860px) { .app { grid-template-columns: 1fr; } .sidebar { display: none; } }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <svg width="30" height="30" viewBox="0 0 100 100">
          <line x1="50" y1="18" x2="24" y2="50" stroke="#b8ea2e" stroke-width="4" stroke-dasharray="7 6" opacity="0.85"/>
          <line x1="24" y1="50" x2="50" y2="82" stroke="#b8ea2e" stroke-width="4" stroke-dasharray="7 6" opacity="0.85"/>
          <line x1="50" y1="82" x2="76" y2="50" stroke="#b8ea2e" stroke-width="4" stroke-dasharray="7 6" opacity="0.85"/>
          <line x1="76" y1="50" x2="50" y2="18" stroke="#b8ea2e" stroke-width="4" stroke-dasharray="7 6" opacity="0.85"/>
          <circle cx="50" cy="18" r="7" fill="#7a7a7a"/>
          <circle cx="50" cy="82" r="7" fill="#7a7a7a"/>
          <circle cx="24" cy="50" r="9" fill="#d4f95a"/>
          <circle cx="76" cy="50" r="13" fill="#b8ea2e"/>
          <circle cx="76" cy="50" r="5" fill="#6b7c1f"/>
        </svg>
      </div>
      <h1>لحظة</h1>
    </div>

    <button class="new-chat-btn" onclick="newChat()"><span class="plus">＋</span> محادثة جديدة</button>
    <button class="nav-btn" onclick="clearChat()">🗑️ مسح المحادثة</button>

    <div class="sidebar-bottom">
      <div class="status-line"><span class="dot loading" id="statusDot"></span> <span id="statusText">جاري الاتصال بلحظة…</span></div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="pill">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;"></span>
        لحظة · Lahza Agency
      </div>
    </div>

    <div class="chat-scroll">
      <button class="scroll-down-btn" id="scrollDownBtn" onclick="scrollToBottom()" title="النزول لآخر رسالة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>
      <div class="chat" id="chat">
        <div class="welcome" id="welcome">
          <svg class="mark" viewBox="0 0 100 100">
            <line x1="50" y1="18" x2="24" y2="50" stroke="#b8ea2e" stroke-width="3.5" stroke-dasharray="7 6" opacity="0.85"/>
            <line x1="24" y1="50" x2="50" y2="82" stroke="#b8ea2e" stroke-width="3.5" stroke-dasharray="7 6" opacity="0.85"/>
            <line x1="50" y1="82" x2="76" y2="50" stroke="#b8ea2e" stroke-width="3.5" stroke-dasharray="7 6" opacity="0.85"/>
            <line x1="76" y1="50" x2="50" y2="18" stroke="#b8ea2e" stroke-width="3.5" stroke-dasharray="7 6" opacity="0.85"/>
            <circle cx="50" cy="18" r="6" fill="#7a7a7a"/>
            <circle cx="50" cy="82" r="6" fill="#7a7a7a"/>
            <circle cx="24" cy="50" r="8" fill="#d4f95a"/>
            <circle cx="76" cy="50" r="11" fill="#b8ea2e"/>
            <circle cx="76" cy="50" r="4" fill="#6b7c1f"/>
          </svg>
          <h3>أهلاً بيك 👋</h3>
          <p>اكتب أي حاجة عايزها — إيميل، كود، أو صورة — من غير ما تختار وضع. لحظة هتفهم طلبك من نفسها.</p>
        </div>
      </div>
    </div>

    <div class="composer-wrap">
      <div class="composer">
        <div class="attach-chip" id="attachChip" style="display:none;"></div>
        <div class="composer-box">
          <input type="file" id="fileInput" style="display:none" accept=".txt,.md,.csv,.json,.js,.py,.html,.css,.log,.yml,.yaml,.xml" onchange="handleFile(event)">
          <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="إرفاق ملف أو صورة">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a5 5 0 01-7.07-7.07l9.19-9.19a3 3 0 014.24 4.24l-8.49 8.49a1 1 0 01-1.42-1.42l7.78-7.78"/></svg>
          </button>
          <textarea id="input" placeholder="اكتب طلبك هنا…" rows="1"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
          </button>
        </div>
        <div class="hint">
          <span>Enter للإرسال، Shift+Enter لسطر جديد</span>
          <span id="charCount">0</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ⚙️ CONFIG
  const API_BASE = "https://lahza-production-9e2e.up.railway.app";
  const AGENT_KEY = "lahza-x7K9pQ2vN4mR8sT1";
  const CHAT_URL = API_BASE + "/api/chat";
  const TAGS_URL = API_BASE + "/api/tags";
  const MODEL = "lahza";

  let history = [];
  let attachedFile = null; // { kind: "image"|"text", name, dataUrl?, text? }
  const VISION_SUPPORTED = false; // set true only if you switch the base model to a vision-capable one (e.g. qwen2.5vl)
  const MAX_TEXT_FILE_CHARS = 20000;
  const MAX_IMAGE_MB = 8;

  const chatEl = document.getElementById("chat");
  const chatScrollEl = document.querySelector(".chat-scroll");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const welcomeEl = document.getElementById("welcome");
  const scrollDownBtn = document.getElementById("scrollDownBtn");

  function scrollToBottom() { chatScrollEl.scrollTop = chatScrollEl.scrollHeight; }
  chatScrollEl.addEventListener("scroll", () => {
    const distanceFromBottom = chatScrollEl.scrollHeight - chatScrollEl.scrollTop - chatScrollEl.clientHeight;
    scrollDownBtn.classList.toggle("show", distanceFromBottom > 120);
  });

  function escapeHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function formatContent(text) {
    const parts = text.split(/```(\w*)\n?([\s\S]*?)```/g);
    let html = "";
    for (let i = 0; i < parts.length; i += 3) {
      html += escapeHtml(parts[i] || "").replace(/\n/g, "<br>");
      if (parts[i+2] !== undefined) html += `<pre>${escapeHtml(parts[i+2])}</pre>`;
    }
    return html;
  }

  const BOT_AVATAR = `<svg viewBox="0 0 100 100"><line x1="50" y1="18" x2="24" y2="50" stroke="#b8ea2e" stroke-width="7" stroke-dasharray="10 8" opacity="0.85"/><line x1="24" y1="50" x2="50" y2="82" stroke="#b8ea2e" stroke-width="7" stroke-dasharray="10 8" opacity="0.85"/><line x1="50" y1="82" x2="76" y2="50" stroke="#b8ea2e" stroke-width="7" stroke-dasharray="10 8" opacity="0.85"/><line x1="76" y1="50" x2="50" y2="18" stroke="#b8ea2e" stroke-width="7" stroke-dasharray="10 8" opacity="0.85"/><circle cx="50" cy="18" r="12" fill="#7a7a7a"/><circle cx="50" cy="82" r="12" fill="#7a7a7a"/><circle cx="24" cy="50" r="16" fill="#d4f95a"/><circle cx="76" cy="50" r="22" fill="#b8ea2e"/><circle cx="76" cy="50" r="8" fill="#6b7c1f"/></svg>`;

  function appendMsg(role, content, imgSrc) {
    if (welcomeEl.parentNode) welcomeEl.remove();
    const row = document.createElement("div");
    row.className = "row " + (role === "user" ? "user" : "bot");
    const avatar = role === "user" ? "" : `<div class="avatar bot-avatar">${BOT_AVATAR}</div>`;
    let inner = formatContent(content || "");
    if (imgSrc) inner += `<img class="gen" src="${imgSrc}" alt="generated image">`;
    row.innerHTML = (role === "user" ? "" : avatar) + `<div class="bubble">${inner}</div>`;
    chatEl.appendChild(row);
    chatScrollEl.scrollTop = chatScrollEl.scrollHeight;
    return row.querySelector(".bubble");
  }

  function appendNote(text) {
    if (welcomeEl.parentNode) welcomeEl.remove();
    const row = document.createElement("div");
    row.className = "row bot note-row";
    row.innerHTML = `<div class="bubble">${text}</div>`;
    chatEl.appendChild(row);
    chatScrollEl.scrollTop = chatScrollEl.scrollHeight;
  }

  function appendError(text) {
    if (welcomeEl.parentNode) welcomeEl.remove();
    const row = document.createElement("div");
    row.className = "row bot error-row";
    row.innerHTML = `<div class="bubble">${text}</div>`;
    chatEl.appendChild(row);
    chatScrollEl.scrollTop = chatScrollEl.scrollHeight;
  }

  function handleFile(e) {
    const file = e.target.files[0];
    e.target.value = ""; // allow re-selecting the same file later
    if (!file) return;
    const isImage = file.type.startsWith("image/");

    if (isImage && !VISION_SUPPORTED) {
      appendError("⚠️ تحليل الصور مش متاح دلوقتي — لحظة بتقرأ الملفات النصية بس حاليًا.");
      return;
    }

    if (isImage && file.size > MAX_IMAGE_MB * 1024 * 1024) {
      appendError("⚠️ الصورة أكبر من " + MAX_IMAGE_MB + "MB.");
      return;
    }

    const reader = new FileReader();
    reader.onerror = () => appendError("⚠️ مقدرش أقرأ الملف ده.");
    reader.onload = () => {
      if (isImage) {
        attachedFile = { kind: "image", name: file.name, dataUrl: reader.result };
      } else {
        let text = reader.result;
        let truncated = false;
        if (text.length > MAX_TEXT_FILE_CHARS) {
          text = text.slice(0, MAX_TEXT_FILE_CHARS);
          truncated = true;
        }
        attachedFile = { kind: "text", name: file.name, text, truncated };
      }
      showAttachChip();
    };
    if (isImage) reader.readAsDataURL(file);
    else reader.readAsText(file);
  }

  function showAttachChip() {
    const chip = document.getElementById("attachChip");
    if (!attachedFile) { chip.style.display = "none"; chip.innerHTML = ""; return; }
    chip.style.display = "flex";
    const preview = attachedFile.kind === "image"
      ? `<img src="${attachedFile.dataUrl}" alt="">`
      : `📄`;
    chip.innerHTML = `${preview}<span>${escapeHtml(attachedFile.name)}</span><span class="remove" onclick="removeAttachment()" title="إزالة">✕</span>`;
  }

  function removeAttachment() {
    attachedFile = null;
    showAttachChip();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text && !attachedFile) return;
    inputEl.value = "";
    document.getElementById("charCount").textContent = "0";
    autoresize();

    const attachment = attachedFile;
    attachedFile = null;
    showAttachChip();

    const userMsg = { role: "user", content: text };
    let displayHtml = "";
    let displayImg = null;

    if (attachment && attachment.kind === "text") {
      const note = attachment.truncated ? " (متقطوع، الملف كان أكبر من اللازم)" : "";
      userMsg.content =
        `محتوى الملف المرفق "${attachment.name}"${note}:\n\`\`\`\n${attachment.text}\n\`\`\`\n\n` +
        (text || "لخّص الملف ده وقولّي أهم حاجة فيه.");
      displayHtml = `<div class="file-tag">📄 ${escapeHtml(attachment.name)}</div><br>` + escapeHtml(text || "لخّص الملف ده");
    } else if (attachment && attachment.kind === "image") {
      // Note: only vision-capable Ollama models (e.g. qwen2.5vl/llava) can actually
      // interpret this; text-only models will just receive it without understanding it.
      userMsg.images = [attachment.dataUrl.split(",")[1]];
      userMsg.content = text || "وصف الصورة دي.";
      displayImg = attachment.dataUrl;
    }

    history.push(userMsg);
    if (displayHtml) {
      if (welcomeEl.parentNode) welcomeEl.remove();
      const row = document.createElement("div");
      row.className = "row user";
      row.innerHTML = `<div class="bubble">${displayHtml}</div>`;
      chatEl.appendChild(row);
      chatScrollEl.scrollTop = chatScrollEl.scrollHeight;
    } else {
      appendMsg("user", text, displayImg);
    }

    sendBtn.disabled = true;
    const thinkingDiv = appendMsg("bot", "…جاري التفكير");

    try {
      const res = await fetch(CHAT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Api-Key": AGENT_KEY },
        body: JSON.stringify({
          model: MODEL,
          messages: history,
          stream: false
        })
      });
      if (!res.ok) throw new Error("الاتصال بلحظة فشل (status " + res.status + ")");
      const data = await res.json();
      const msg = data.message || {};
      const content = msg.content || "(مفيش رد)";
      thinkingDiv.innerHTML = formatContent(content);
      history.push({ role: "assistant", content });
    } catch (err) {
      thinkingDiv.closest(".row").remove();
      appendError("⚠️ مقدرش أوصل للسيرفر. تأكد من اتصال الإنترنت وحاول تاني. تفاصيل: " + err.message);
      history.pop();
      history.push({ role: "user", content: text });
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  function newChat() { history = []; chatEl.innerHTML = ""; chatEl.appendChild(welcomeEl); }
  function clearChat() { newChat(); }

  function autoresize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + "px";
  }
  inputEl.addEventListener("input", () => { document.getElementById("charCount").textContent = inputEl.value.length; autoresize(); });
  inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  async function checkStatus() {
    const dot = document.getElementById("statusDot");
    const text = document.getElementById("statusText");
    try {
      const res = await fetch(TAGS_URL, { headers: { "X-Api-Key": AGENT_KEY } });
      if (!res.ok) throw new Error();
      const data = await res.json();
      const names = (data.models || []).map(m => m.name);
      if (!names.some(n => n.startsWith(MODEL))) {
        dot.className = "dot off";
        text.textContent = "السيرفر شغال، لكن لحظة مش جاهزة دلوقتي";
      } else {
        dot.className = "dot on";
        text.textContent = "لحظة متصلة وجاهزة";
      }
    } catch {
      dot.className = "dot off";
      text.textContent = "لحظة مش متصلة دلوقتي";
    }
  }

  checkStatus();
  setInterval(checkStatus, 15000);
</script>
</body>
</html>
